<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Massar Portal — Ministry of National Education Student Results Portal" />
  <title>Login — Massar Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Top government banner -->
    <header class="gov-banner">
      <div class="gov-banner__inner">
        <span class="gov-banner__text-left">Kingdom of Morocco</span>
        <div class="gov-banner__emblem" aria-hidden="true">
          <img src="logo.svg" alt="Emblem" />
        </div>
        <span class="gov-banner__text-right">Royaume du Maroc</span>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
      <div class="card" style="max-width: 440px;">

        <!-- Brand / Logo -->
        <div class="brand">
          <img class="brand__logo" src="logo.svg" alt="Massar Logo" width="56" height="56" />
          <h1 class="brand__title">Massar</h1>
          <p class="brand__subtitle">Ministry of National Education, Preschool and Sports</p>
        </div>

        <!-- Login form -->
        <form id="login-form" class="form" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">Massar Code <span class="required" aria-hidden="true">*</span></label>
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              placeholder="e.g. K130029841@taalim.ma"
              required
              aria-required="true"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required" aria-hidden="true">*</span></label>
            <div class="password-wrapper">
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="Enter password"
                required
                aria-required="true"
              />
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Show/Hide Password" aria-pressed="false">
                <svg id="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="transition: opacity var(--transition);">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error message area -->
          <div class="alert alert--error" id="error-msg" role="alert" aria-live="assertive" hidden>
            <svg viewBox="0 0 20 20" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span id="error-msg-text"></span>
          </div>

          <button class="btn btn--primary" type="submit" id="submit-btn" style="width: 100%;">
            <span id="btn-label">Log In</span>
            <span id="btn-spinner" class="spinner" hidden aria-hidden="true"></span>
          </button>
        </form>

        <p class="help-text">
          For assistance, please contact your school administration.
        </p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="gov-footer">
      <span>© 2026 Ministry of National Education, Preschool and Sports — Kingdom of Morocco</span>
    </footer>
  </div>

  <script src="login.js"></script>
</body>
</html>
