<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Massar Portal — Student Exam Results" />
  <title>My Results — Massar Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Top government banner -->
    <header class="gov-banner">
      <div class="gov-banner__inner">
        <span class="gov-banner__text-left">Kingdom of Morocco</span>
        <div class="gov-banner__emblem" aria-hidden="true">
          <img src="logo.svg" alt="Emblem" />
        </div>
        <span class="gov-banner__text-right">Royaume du Maroc</span>
      </div>
    </header>

    <!-- App Navbar -->
    <nav class="navbar">
      <div class="navbar__inner">
        <div class="navbar__brand">
          <img src="logo.svg" alt="Massar Logo" class="navbar__logo" />
          <span class="navbar__title">Massar</span>
        </div>
        <button class="btn btn--ghost btn--sm" id="logout-btn" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right: 6px; vertical-align: middle;">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log Out
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content" style="align-items: flex-start;">
      <div class="container">

        <!-- Loading skeleton -->
        <div id="loading-state" class="loading-card" aria-live="polite" aria-label="Loading results">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line skeleton--short"></div>
          <div class="skeleton skeleton--table"></div>
        </div>

        <!-- Error state -->
        <div id="error-state" class="alert alert--error" role="alert" hidden>
          <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <div>
            <strong style="display: block; margin-bottom: 4px;">Failed to Load Results</strong>
            <p id="error-msg-text"></p>
          </div>
        </div>

        <!-- Results card (populated by JS) -->
        <div id="results-state" hidden>

          <!-- Student info card -->
          <div class="student-card">
            <div class="student-card__header">
              <div class="student-avatar" aria-hidden="true">
                <svg viewBox="0 0 40 40" width="40" height="40" fill="currentColor">
                  <circle cx="20" cy="16" r="8" opacity="0.8"/>
                  <ellipse cx="20" cy="36" rx="14" ry="8" opacity="0.6"/>
                </svg>
              </div>
              <div class="student-card__info">
                <h1 class="student-card__name" id="student-name">—</h1>
                <p class="student-card__code" id="student-code">—</p>
              </div>
              <!-- Result badge -->
              <div class="result-badge" id="result-badge" aria-live="polite">
                <span id="result-label">—</span>
              </div>
            </div>

            <!-- Divider -->
            <hr class="divider" />

            <!-- Subject results table -->
            <section aria-labelledby="subjects-heading">
              <h2 class="section-title" id="subjects-heading">Subject Grades</h2>
              <div class="table-wrapper">
                <table class="results-table" id="subjects-table">
                  <thead>
                    <tr>
                      <th scope="col">Subject</th>
                      <th scope="col" class="grade-col">Grade / 20</th>
                      <th scope="col" class="status-col">Status</th>
                    </tr>
                  </thead>
                  <tbody id="subjects-tbody">
                    <!-- Populated by JS -->
                  </tbody>
                  <tfoot>
                    <tr class="average-row">
                      <td><strong>Overall Average</strong></td>
                      <td class="grade-col"><strong id="average-grade">—</strong></td>
                      <td class="status-col"></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </section>

            <!-- Print / download hint -->
            <p class="print-hint">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="vertical-align: middle;">
                <polyline points="6 9 6 2 18 2 18 9"/>
                <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                <rect x="6" y="14" width="12" height="8"/>
              </svg>
              You can print this page or save as PDF by pressing Ctrl + P
            </p>
          </div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="gov-footer">
      <span>© 2026 Ministry of National Education, Preschool and Sports — Kingdom of Morocco</span>
    </footer>
  </div>

  <script src="results.js"></script>
</body>
</html>
