name: Terraform CI/CD
on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"

  push:
    branches:
      - main
    paths:
      - "infra/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_environment: "dev"
  TF_VAR_aws_region: "eu-south-1"
  TF_VAR_db_name: "massardb"
  TF_VAR_db_username: "aymenelk01"
  TF_VAR_db_password: ${{ secrets.DATABASE_PASSWORD }} # Sensitive: pull from GitHub Secrets
  TF_VAR_documents_bucket_name: "app-massar-documents"
  TF_VAR_static_bucket_name: "app-massar-static"
  TF_VAR_state_bucket_name: "app-massar-state"
  TF_VAR_logs_bucket_name: "app-massar-logs"

defaults:
  run:
    working-directory: infra/

jobs:
  # ==========================================
  # Job 1: CI (Runs only on Pull Requests)
  # ==========================================
  terraform-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: eu-south-1
          role-session-name: github-actions-terraform-validation

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -input=false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: "latest"
          cache: true
          tflint_config_path: "infra/.tflint.hcl"

      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          soft_fail: false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

  # ==========================================
  # Job 2: CD (Runs only on pushes/merges to main)
  # ==========================================
  terraform-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: eu-south-1
          role-session-name: github-actions-terraform-deployment

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        id: apply
        run: |
          set -o pipefail
          terraform apply -json tfplan | tee apply_output.json | jq --unbuffered -r '.["@message"] // empty'

      - name: Show Terraform Outputs
        if: steps.apply.outcome == 'success'
        run: terraform output

      - name: Verify Cognito Deployment Status
        id: verify-cognito
        if: always()
        run: |
          if [ -f apply_output.json ]; then
            COGNITO_SUCCESS=$(jq -s 'map(select(.type == "apply_complete" and .hook?.resource?.resource_type? and (.hook.resource.resource_type | startswith("aws_cognito")) and (.hook.action == "create" or .hook.action == "update"))) | length > 0' apply_output.json)
            echo "applied=$COGNITO_SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "applied=false" >> $GITHUB_OUTPUT
          fi

      - name: Create admin user account in Cognito
        # Runs ONLY if Cognito was successfully deployed or updated regardless of the Terraform Apply outcome
        if: always() && steps.verify-cognito.outputs.applied == 'true'
        run: |
          # 1. Give the script executable permissions
          chmod +x ./scripts/setup-cognito-admin.sh

          # 2. Extract the live pool ID from Terraform and map it to your script variable
          export COGNITO_USER_POOL_ID=$(terraform output -raw user_pool_id)

          # 3. Run the bash script to create the admin user in the Cognito User Pool
          ../scripts/setup-cognito-admin.sh

      - name: Trigger static frontend redeployment
        # Runs ONLY if Cognito was successfully deployed or updated regardless of the Terraform Apply outcome
        if: always() && steps.verify-cognito.outputs.applied == 'true'
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.APP_REPO_DISPATCH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/aymenelk01/massar-app/dispatches \
          -d '{"event_type": "terraform-apply-completed"}'

      - name: Enforce Pipeline Status
        if: always()
        run: |
          if [ "${{ steps.apply.outcome }}" == "failure" ]; then
            echo "Terraform Apply failed with error. Please check the logs for details."
            exit 1
          fi