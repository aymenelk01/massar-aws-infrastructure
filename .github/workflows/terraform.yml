name: Terraform CI/CD
on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'

  push:
    branches:
      - main
    paths:
      - 'infra/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_environment: "dev"
  TF_VAR_aws_region: "eu-south-1"
  TF_VAR_db_name: "massardb"
  TF_VAR_db_username: "aymenelk01"
  TF_VAR_db_password: ${{ secrets.DATABASE_PASSWORD }} # Sensitive: pull from GitHub Secrets
  TF_VAR_documents_bucket_name: "app-massar-documents"
  TF_VAR_static_bucket_name: "app-massar-static"
  TF_VAR_state_bucket_name: "app-massar-state"
  TF_VAR_logs_bucket_name: "app-massar-logs"

defaults:
  run:
    working-directory: infra/

jobs:
  # ==========================================
  # Job 1: CI (Runs only on Pull Requests)
  # ==========================================
  terraform-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: eu-south-1
          role-session-name: github-actions-terraform-validation

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -input=false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: "latest"
          cache: true
          tflint_config_path: "infra/.tflint.hcl"
      
      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          soft_fail: false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

  # ==========================================
  # Job 2: CD (Runs only on pushes/merges to main)
  # ==========================================
  terraform-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: eu-south-1
          role-session-name: github-actions-terraform-deployment

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Detect Cognito changes
        id: cognito-changes
        run: |
          COGNITO_CHANGED=$(terraform show -json tfplan | \
            jq '[.resource_changes[] | 
              select(.type | startswith("aws_cognito")) | 
              select(.change.actions[] | (contains("update") or contains("create")))] | 
              length > 0')
          echo "changed=$COGNITO_CHANGED" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Trigger static frontend redeployment
        if: steps.cognito-changes.outputs.changed == 'true'
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.APP_REPO_DISPATCH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/aymenelk01/massar-app/dispatches \
          -d '{"event_type": "terraform-apply-completed"}'