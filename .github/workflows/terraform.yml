name: Terraform CI/CD
on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"

  push:
    branches:
      - main
    paths:
      - "infra/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  terraform-pipeline:
    runs-on: ubuntu-latest
    env:
      TF_VAR_environment: "dev"
      TF_VAR_aws_region: "eu-south-1"
      TF_VAR_db_name: "massardb"
      TF_VAR_db_username: "aymenelk01"
      TF_VAR_db_password: ${{ secrets.DATABASE_PASSWORD }} # Sensitive: pull from GitHub Secrets
      TF_VAR_documents_bucket_name: "app-massar-documents"
      TF_VAR_static_bucket_name: "app-massar-static"
      TF_VAR_state_bucket_name: "app-massar-state"
      TF_VAR_logs_bucket_name: "app-massar-logs"
      TF_VAR_cloudfront_prefix_list_id: "pl-1bbc5972"
    defaults:
      run:
        working-directory: infra/
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: eu-south-1
          role-session-name: github-actions-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      # Catch formatting syntax errors early
      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -input=false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: "latest"
          cache: true
          tflint_config_path: "infra/.tflint.hcl"

      - name: Run TFLint
        run: |
          tflint --init --config=infra/.tflint.hcl
          tflint -f compact --config=infra/.tflint.hcl infra/

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          soft_fail: false

      # Validate code integration without calling AWS APIs
      - name: Terraform Validate
        run: terraform validate

      # Save plan file to ensure 'apply' executes exactly what was approved
      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      # Apply only on push events to prevent unintended changes from PRs
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply tfplan
